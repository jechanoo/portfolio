<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — DataForge</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --card: #1a2236;
            --accent: #3b82f6;
            --green: #10b981;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: #1e293b;
            --gradient: linear-gradient(135deg, #3b82f6, #6366f1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem 2rem;
            max-width: 500px;
        }
        .check {
            width: 70px;
            height: 70px;
            background: rgba(16,185,129,0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }
        h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
        p { color: var(--muted); margin-bottom: 0.5rem; }
        .highlight {
            background: rgba(59,130,246,0.1);
            color: var(--accent);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
        }
        a {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text);
            text-decoration: none;
            padding: 0.6rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s;
        }
        a:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">&#10003;</div>
        <h1>Request Received!</h1>
        <p>I'll review your project and reply within <span class="highlight">1 hour</span>.</p>
        <p style="font-size:0.9rem;color:var(--muted);">You'll also receive a confirmation email shortly.</p>
        <a href="index.html">&larr; Back to Home</a>
    </div>
</body>
</html>
